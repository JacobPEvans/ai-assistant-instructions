# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
exclude: ^\.github/aw/
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.17.2
    hooks:
      - id: markdownlint-cli2
        name: markdownlint-cli2
        description: "Markdown linter"
        entry: markdownlint-cli2
        language: node
        files: \.md$
        require_serial: true
        args: ["--config", ".markdownlint-cli2.jsonc", "--fix"]
  - repo: https://github.com/streetsidesoftware/cspell-cli
    rev: v8.16.1
    hooks:
      - id: cspell
        name: cspell
        description: "Spell checker for code"
        args: ["--config", ".cspell.json"]
        files: \.md$
        additional_dependencies:
          - "@cspell/dict-aws@4.0.17"
          - "@cspell/dict-bash@4.2.2"
          - "@cspell/dict-companies@3.2.11"
          - "@cspell/dict-data-science@2.0.13"
          - "@cspell/dict-docker@1.1.17"
          - "@cspell/dict-filetypes@3.0.18"
          - "@cspell/dict-git@3.1.0"
          - "@cspell/dict-html@4.0.15"
          - "@cspell/dict-k8s@1.0.12"
          - "@cspell/dict-markdown@2.0.16"
          - "@cspell/dict-node@5.0.9"
          - "@cspell/dict-npm@5.2.38"
          - "@cspell/dict-python@4.2.26"
          - "@cspell/dict-shell@1.1.2"
          - "@cspell/dict-software-terms@5.2.2"
          - "@cspell/dict-terraform@1.1.3"
          - "@cspell/dict-typescript@3.2.3"
  - repo: https://github.com/lycheeverse/lychee
    rev: v0.15.1
    hooks:
      - id: lychee
        name: lychee-link-check
        description: "Check for broken links in markdown files"
        args:
          - "--no-progress"
          - "--exclude"
          - "shields.io"
          - "--exclude"
          - "github.com/.*/badge"
          - "--exclude"
          - "gist.github.com"
        files: \.md$
  - repo: local
    hooks:
      - id: check-markdown-links
        name: check-markdown-links
        description: "Check for broken file links in markdown files"
        entry: python3 scripts/check-markdown-links.py
        language: system
        files: \.md$
        pass_filenames: false
      - id: cclint
        name: cclint
        description: "Validate Claude Code instruction files"
        entry: bash -c 'command -v cclint >/dev/null 2>&1 && cclint || npx @carlrannaberg/cclint'
        language: system
        files: ^\.claude/
        pass_filenames: false
        stages: [pre-push]
      - id: validate-permissions
        name: validate-permissions
        description: "Validate permission files for cclint compatibility"
        entry: bash scripts/validate-permissions.sh
        language: system
        files: ^agentsmd/permissions/(?!valid-tools\.json).*\.json$
        pass_filenames: false
        stages: [pre-commit]
